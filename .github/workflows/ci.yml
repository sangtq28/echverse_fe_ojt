# ==========================================================
# Frontend Continuous Integration (CI)
# ----------------------------------------------------------
# Purpose:
#   Validate frontend code before it is merged into main.
#
# Triggers:
#   1. Pull Request targeting the main branch
#   2. Push (commit/merge) to the main branch
#
# CI Steps:
#   1. Checkout repository
#   2. Display commit information
#   3. Setup Node.js environment
#   4. Install dependencies
#   5. Run lint checks
#   6. Run unit tests
#   7. Build the production bundle
#
# Maintainer: Your Name
# ==========================================================

name: Frontend CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  frontend-ci:
    name: Run Frontend CI Pipeline
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2 — Display commit information
      - name: Show commit metadata
        run: |
          echo "Repository: $GITHUB_REPOSITORY"
          echo "Branch: $GITHUB_REF"
          echo "Commit SHA: $GITHUB_SHA"
          echo "Triggered by: $GITHUB_ACTOR"

      # Step 3 — Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Step 4 — Install dependencies
      - name: Install dependencies
        run: npm ci

      # Step 5 — Run linter
      - name: Run lint checks
        run: npm run lint --if-present

      # Step 6 — Run tests
      - name: Run unit tests
        run: npm test -- --run

      # Step 7 — Build production bundle
      - name: Build application
        run: npm run build
